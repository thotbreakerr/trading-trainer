# Day Trading Trainer — app configuration.
# Human-edited YAML, re-read on restart. There is no settings screen by design.

watchlist: [SPY, QQQ, AAPL, NVDA, TSLA, MSFT, AMD, META]

# Paper account (doc §9)
starting_balance: 30000.0
intraday_leverage: 4.0
default_risk_pct: 1.0        # sizing calculator: % of equity risked per trade

# Data (doc §5, §11)
backfill_days: 30            # first-run backfill: trading days before today
rvol_baseline_days: 20       # lookback window for relative-volume baseline
poll_interval_seconds: 60    # Market Day REST polling cadence

# Database location. Default lives OUTSIDE OneDrive (SQLite WAL + cloud sync
# is a corruption risk): %LOCALAPPDATA%\trading-trainer\trainer.db
# Set an absolute path here to override, or leave null for the default.
db_path: null

# Backups: small user-data-only snapshots (progress/setups/orders/trades/
# briefings — the tables the bar cache can't rebuild). Cold single files are
# safe in OneDrive, unlike the live WAL database, so the default destination
# inside the project folder is deliberate: it doubles as off-machine backup.
backup_dir: null                # default: <repo>/backups
backup_keep: 14                 # newest K kept; 0 disables backups
backup_min_interval_hours: 12   # at most one backup per this window

# Escape hatches (doc §12) — config-only, no UI
allow_untrained_trading: false
